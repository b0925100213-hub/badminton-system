<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽球雲端同步排點系統 v5.0</title>
    <style>
        :root { --primary: #0f172a; --accent: #10b981; --danger: #ef4444; }
        body { font-family: sans-serif; background: #f8fafc; margin: 0; padding: 15px; color: #334155; line-height: 1.5; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h1 { text-align: center; color: var(--primary); font-size: 22px; margin-bottom: 20px; }
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        input, button { padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 600; }
        .btn-draw { background: var(--accent); font-size: 20px; padding: 20px; margin-top: 10px; }
        .timer-box { font-size: 48px; font-weight: 800; text-align: center; margin: 10px 0; font-family: monospace; color: var(--primary); }
        .my-status { background: #f1f5f9; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 5px solid var(--accent); min-height: 100px; }
        .status-msg { text-align: center; color: var(--accent); font-weight: bold; margin: 10px 0; font-size: 14px; }
        .loading { color: #94a3b8; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="container" style="max-width: 500px; margin: 0 auto;">
    <h1>🏸 羽球雲端同步系統</h1>
    <div id="loadingMsg" class="loading">正在連線至雲端資料庫...</div>

    <div class="card">
        <h3>⚙️ 活動設定</h3>
        <div class="setup-grid">
            <div><label style="font-size:12px;">場地數量</label><input type="number" id="courtNum" value="2"></div>
            <div><label style="font-size:12px;">總人數</label><input type="number" id="playerNum" value="12"></div>
        </div>
        <button onclick="initSystemCloud()">1. 初始化新活動 (主辦人點擊)</button>
        <div id="initStatus" class="status-msg"></div>
        <div class="timer-box" id="timerDisplay">15:00</div>
    </div>

    <div class="card" id="drawSection" style="display:none; text-align:center;">
        <h3>🎲 領取球員代號</h3>
        <p id="remainingCount" style="font-size:12px; color:#64748b;">正在載入...</p>
        <button class="btn-draw" id="drawBtn" onclick="drawCodeCloud()">點擊抽籤</button>
        <div id="drawResult" style="font-size:40px; font-weight:bold; color:var(--accent); margin-top:10px;"></div>
    </div>

    <div class="card" id="querySection" style="display:none;">
        <h3>🔍 個人賽程查詢</h3>
        <input type="number" id="searchCode" placeholder="輸入代號" oninput="searchSchedule()">
        <div id="personalSchedule" class="my-status"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayRemove, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAZBxht3PdOnJ6vb1cfkWKDG7cBrAmOrrg",
        authDomain: "badminton-sync.firebaseapp.com",
        projectId: "badminton-sync",
        storageBucket: "badminton-sync.firebasestorage.app",
        messagingSenderId: "1062373757796",
        appId: "1:1062373757796:web:a54e623fc12d0e834ea071",
        measurementId: "G-TTB3XDKBPF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const gameId = "today_match"; 

    let localSchedule = [];
    let totalPlayers = 0;

    onSnapshot(doc(db, "games", gameId), (docSnap) => {
        document.getElementById('loadingMsg').style.display = 'none';
        if (docSnap.exists()) {
            const data = docSnap.data();
            localSchedule = data.schedule;
            totalPlayers = data.totalPlayers;
            
            document.getElementById('initStatus').innerText = "☁️ 已從雲端同步最新賽程";
            document.getElementById('drawSection').style.display = 'block';
            document.getElementById('querySection').style.display = 'block';
            document.getElementById('remainingCount').innerText = `剩餘可抽取號碼：${data.pool.length} 個`;
            
            searchSchedule(); 
        } else {
            document.getElementById('initStatus').innerText = "❌ 雲端尚無活動，請主辦人初始化。";
        }
    });

    window.initSystemCloud = async () => {
        const M = parseInt(document.getElementById('playerNum').value);
        const N = parseInt(document.getElementById('courtNum').value);
        if (M < 4 * N) return alert("人數不足！");

        let playCounts = {};
        for (let i = 1; i <= M; i++) playCounts[i] = 0;
        let schedule = [];

        for (let r = 0; r < 8; r++) {
            let sorted = Array.from({length: M}, (_, i) => i + 1)
                .map(id => ({ id, count: playCounts[id], rand: Math.random() }))
                .sort((a, b) => a.count - b.count || a.rand - b.rand);
            let selected = sorted.slice(0, N * 4).map(p => p.id);
            for (let i = selected.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [selected[i], selected[j]] = [selected[j], selected[i]];
            }
            let roundMatches = [];
            for (let c = 0; c < N; c++) {
                let m = selected.slice(c * 4, (c + 1) * 4);
                m.forEach(id => playCounts[id]++);
                // 修正重點：將陣列轉換為物件儲存，避免 Nested Arrays 報錯
                roundMatches.push({ court: c + 1, teamList: m }); 
            }
            schedule.push({ roundIndex: r + 1, matches: roundMatches });
        }

        try {
            await setDoc(doc(db, "games", gameId), {
                schedule: schedule,
                pool: Array.from({length: M}, (_, i) => i + 1), 
                totalPlayers: M,
                createdAt: new Date()
            });
            alert("✅ 雲端初始化成功！");
        } catch (e) {
            console.error(e);
            alert("發生錯誤：" + e.message);
        }
    };

    window.drawCodeCloud = async () => {
        const docRef = doc(db, "games", gameId);
        const docSnap = await getDoc(docRef);
        if (!docSnap.exists()) return alert("請先等候主辦人初始化！");
        
        let pool = docSnap.data().pool;
        if (pool.length === 0) return alert("號碼已抽完！");

        let randomIndex = Math.floor(Math.random() * pool.length);
        let myCode = pool[randomIndex];

        try {
            await updateDoc(docRef, { pool: arrayRemove(myCode) });
            document.getElementById('drawResult').innerText = "P" + myCode;
            document.getElementById('searchCode').value = myCode;
            localStorage.setItem('myBadmintonCode', myCode); 
            searchSchedule();
        } catch (e) {
            alert("抽籤失敗，請再試一次。");
        }
    };

    window.searchSchedule = () => {
        const code = parseInt(document.getElementById('searchCode').value);
        const display = document.getElementById('personalSchedule');
        if (!code || !localSchedule.length) return;

        let totalGames = 0;
        let html = `<strong>P${code} 的賽程表：</strong><br><hr style="border:0.5px solid #eee">`;
        localSchedule.forEach((roundObj) => {
            let foundInRound = false;
            roundObj.matches.forEach(m => {
                if (m.teamList.includes(code)) {
                    html += `第 ${roundObj.roundIndex} 場：🧱 <strong>場地 ${m.court}</strong><br>`;
                    foundInRound = true; totalGames++;
                }
            });
            if (!foundInRound) html += `<span style="color:#94a3b8">第 ${roundObj.roundIndex} 場：💤 休息</span><br>`;
        });
        display.innerHTML = html + `<hr style="border:0.5px solid #eee"><strong>共出賽 ${totalGames} 場</strong>`;
    };

    const saved = localStorage.getItem('myBadmintonCode');
    if (saved) {
        document.getElementById('searchCode').value = saved;
        document.getElementById('drawResult').innerText = "P" + saved;
    }
</script>

</body>
</html>
